[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  # Firebase Web API keys are public client-side values secured by Firebase
  # Security Rules + domain restrictions — not by being secret.
  # Netlify's smart detection incorrectly flags AIza* keys as secrets.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
